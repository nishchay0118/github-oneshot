name: ci-cd pipeline 

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: check-code
        uses: actions/checkout@v4

      - name: login to dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOCKEN }}

      - name: build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/node-img:v1 .

      - name: push to docker hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/node-img:v1

      - name: login to ec2 
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          user: ubuntu
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/node-img:v1
            docker stop node-app || true
            docker rm node-app || true
            docker run -d -it -p 3000:3000 --name=node-app ${{ secrets.DOCKER_USERNAME }}/node-img 
