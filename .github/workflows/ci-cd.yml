name: ci-cd pipeline 

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkcode
        uses: actions/checkout@v4

      - name: setup version
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install dependencies 
        run: npm install

      - name: test build 
        run: npm test

       
  build:
    runs-on: ubuntu-latest
    needs: test



    steps:
      - name: check-code
        uses: actions/checkout@v4

      - name: login to dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOCKEN }}

      - name: build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/node-img:${{ github.sha }} .

      - name: push to docker hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/node-img:${{ github.sha }}

      - name: login to ec2 
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            OLD_IMAGE=$(docker inspect node-app --format='{{.Config.Image}}' 2>/dev/null || true)
            echo "old image: $OLD_IMAGE"

            docker pull ${{ secrets.DOCKER_USERNAME }}/node-img:${{ github.sha }}
            docker stop node-app || true
            docker rm node-app || true
            docker run -d -it -p 3000:3000 --name=node-app ${{ secrets.DOCKER_USERNAME }}/node-img:${{ github.sha }}

            sleep 10

            curl http://localhost:3000/health then,
             echo " deployment complete"
            else
             echo "deployment fail"

             docker stop node-app || true
             docker rm node-app || true 

             if [ ! -z "$OLD_IMAGE" ]; then
              echo "rolling back"

              docker run -d -p 3000:3000 --name=node-app $OLD_IMAGE

            fi
            exit
         fi
            
